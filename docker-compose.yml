services:
  web:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/miniteamclaw
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/openclaw/miniteamclaw/uploads:/shared/uploads
    networks:
      - app_net
    restart: unless-stopped

  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: miniteamclaw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d miniteamclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
