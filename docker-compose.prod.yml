services:
  web:
    image: ihunterdev/miniteamclawui:0.0.3-admin-bootstrap
    pull_policy: always
    init: true
    env_file:
      - ${APP_ENV_FILE:-.env.prod}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-miniteamclaw}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OPENCLAW_UPLOAD_DIR_HOST:-/home/openclaw/miniteamclaw/uploads}:${OPENCLAW_UPLOAD_DIR_CONTAINER:-/shared/uploads}
    networks:
      - app_net
    restart: unless-stopped

  db:
    image: postgres:16-bookworm
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miniteamclaw}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
